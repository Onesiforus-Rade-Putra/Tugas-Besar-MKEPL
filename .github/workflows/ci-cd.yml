name: MKEPL CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: read

jobs:
  build:
    name: Continuous Integration - Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build project without tests
        run: mvn -B clean package -Dmaven.test.skip=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tubesv2-jar
          path: target/*.jar

  test:
    name: Continuous Testing - Unit Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-report
          path: target/surefire-reports/

  inspect:
    name: Continuous Inspection - SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run SonarCloud analysis and wait for quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: onesiforus-rade-putra
          SONAR_PROJECT_KEY: Onesiforus-Rade-Putra_Tugas-Besar-MKEPL
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.token=$SONAR_TOKEN
            -Dsonar.qualitygate.wait=true

  deploy-staging:
    name: Continuous Delivery - Deploy to Staging
    runs-on: ubuntu-latest
    needs: inspect
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tubesv2-jar
          path: staging-artifact

      - name: Show staging deployment result
        run: |
          echo "Artifact berhasil dideploy ke environment staging."
          ls -lah staging-artifact

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment
          path: staging-artifact/*.jar

  release-production:
    name: Continuous Delivery - Production Release Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-deployment
          path: release-artifact

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Tubes DPBO Release v1.0.${{ github.run_number }}
          files: release-artifact/*.jar
          generate_release_notes: true